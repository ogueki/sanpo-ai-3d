<!DOCTYPE html>
<html lang="ja" class="h-full touch-manipulation select-none">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI旅のおとも ver2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <meta name="color-scheme" content="dark light">
  <style>
    :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
    html, body { background: #0a0a0a; }
    #preview { width:100vw; height:100dvh; object-fit:cover; background:black; }
    @keyframes fadeAway { 0%{opacity:1} 70%{opacity:.3} 100%{opacity:0} }
    .fade-out { animation: fadeAway 3.6s ease forwards; }
    .sheet { transition: transform .26s ease, opacity .26s ease }
    * { -webkit-tap-highlight-color: transparent; }

    /* モード切替ピル */
    .mode-pill { backdrop-filter: blur(12px); }
    .mode-btn { transition: all .2s ease; }
    .mode-btn.active-chat { background: #f59e0b; color: #000; }
    .mode-btn.active-scan { background: #06b6d4; color: #000; }

    /* レアリティカラー */
    .rarity-コモン { border-color: #a1a1aa; }
    .rarity-レア { border-color: #3b82f6; }
    .rarity-スーパーレア { border-color: #a855f7; }
    .rarity-レジェンド { border-color: #eab308; box-shadow: 0 0 12px rgba(234,179,8,0.3); }

    /* スキャンアニメーション */
    @keyframes scanLine { 0%{top:0} 100%{top:100%} }
    .scan-line {
      position: absolute; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, #06b6d4, transparent);
      animation: scanLine 1.5s ease-in-out infinite;
      box-shadow: 0 0 8px #06b6d4;
    }

    /* コレクション画面 */
    .collection-overlay { transition: transform .3s ease, opacity .3s ease; }
    .collection-card { transition: transform .15s ease; }
    .collection-card:active { transform: scale(0.96); }

    /* 3Dビューア */
    model-viewer { width: 100%; height: 300px; --poster-color: transparent; }
  </style>
</head>
<body class="h-full text-zinc-100">

  <!-- フルスクリーンのカメラ表示 -->
  <main id="stage" class="fixed inset-0 overflow-hidden">
    <video id="preview" playsinline autoplay muted></video>

    <!-- オーバーレイ群（タップで表示/非表示） -->
    <div id="chrome" class="pointer-events-none absolute inset-0 z-20 flex flex-col justify-between p-3 md:p-4 opacity-100 transition-opacity duration-200">
      <!-- Top bar -->
      <div class="flex items-center gap-2 pt-[var(--safe-top)]">
        <div class="pointer-events-auto inline-flex items-center gap-2 px-2.5 py-1.5 rounded-xl bg-black/40 ring-1 ring-white/10 backdrop-blur">
          <span id="status-led" class="inline-block w-2.5 h-2.5 rounded-full bg-zinc-500"></span>
          <span id="status-text" class="text-sm text-zinc-200">待機中</span>
        </div>

        <!-- モード切替ピル -->
        <div class="pointer-events-auto mode-pill inline-flex items-center gap-0.5 p-0.5 rounded-full bg-black/50 ring-1 ring-white/10">
          <button id="mode-chat" class="mode-btn active-chat px-3 py-1 text-xs font-bold rounded-full">おしゃべり</button>
          <button id="mode-scan" class="mode-btn px-3 py-1 text-xs font-bold rounded-full text-zinc-400">スキャン</button>
        </div>

        <div class="ml-auto flex items-center gap-2">
          <span id="badge-live" class="hidden pointer-events-auto px-2 py-1 text-xs rounded-md bg-red-600/80">LIVE</span>
          <span id="badge-rec" class="hidden pointer-events-auto px-2 py-1 text-xs rounded-md bg-red-600/80">REC</span>
        </div>
      </div>

      <!-- 右上: チャット（最新のみ濃く、他はフェード） -->
      <div class="absolute right-3 top-14 md:right-4 md:top-16 max-w-[80vw] sm:max-w-[60vw] space-y-1">
        <div id="chat" class="flex flex-col gap-1"></div>
      </div>

      <!-- Bottom controls -->
      <div class="grid grid-cols-3 items-end gap-3 pb-[calc(8px+var(--safe-bottom))]">
        <div class="flex items-center gap-2">
          <button id="btn-switch" class="pointer-events-auto ml-1 inline-flex items-center justify-center w-12 h-12 rounded-full bg-black/40 ring-1 ring-white/10 backdrop-blur hover:bg-black/55" aria-label="カメラ切替">🔄</button>
        </div>
        <div class="flex items-center justify-center">
          <button id="btn-shutter" class="pointer-events-auto relative w-20 h-20 rounded-full bg-amber-500 shadow-[0_0_0_6px_rgba(255,255,255,0.18)] active:scale-95 transition" aria-label="撮影/送信">
            <span id="shutter-inner" class="absolute inset-1 rounded-full bg-amber-600/70"></span>
          </button>
        </div>
        <div class="flex items-center justify-end gap-2">
          <button id="btn-collection" class="pointer-events-auto inline-flex items-center justify-center w-12 h-12 rounded-full bg-black/40 ring-1 ring-white/10 backdrop-blur hover:bg-black/55" aria-label="コレクション">
            <span class="text-lg">🎒</span>
          </button>
          <button id="btn-more" class="pointer-events-auto mr-1 inline-flex items-center justify-center w-12 h-12 rounded-full bg-black/40 ring-1 ring-white/10 backdrop-blur" aria-label="その他">⋯</button>
        </div>
      </div>

      <!-- スキャンモードのオーバーレイ -->
      <div id="scan-overlay" class="hidden absolute inset-0 pointer-events-none z-15">
        <div class="absolute inset-[10%] border-2 border-cyan-400/40 rounded-2xl">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <!-- 画面タップでUI表示/隠すための透明レイヤ -->
    <button id="hitbox" class="absolute inset-0 z-10 bg-transparent" aria-label="UI表示切替"></button>

    <!-- 撮影フラッシュ -->
    <div id="flash" class="hidden absolute inset-0 bg-white/80"></div>

    <!-- ボトムシート -->
    <div id="sheet" class="sheet fixed left-0 right-0 bottom-0 z-30 translate-y-full opacity-0">
      <div class="mx-auto max-w-screen-sm rounded-t-3xl bg-zinc-950/95 ring-1 ring-white/10 backdrop-blur p-4 pb-[calc(12px+var(--safe-bottom))] shadow-2xl">
        <div class="mx-auto mb-3 h-1 w-10 rounded-full bg-white/15"></div>
        <div class="flex items-center justify-between mb-3">
          <div class="text-sm text-zinc-300">詳細コントロール</div>
          <button id="btn-close-sheet" class="px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700">閉じる</button>
        </div>
        <div class="space-y-3">
          <div class="flex items-center gap-3">
            <label class="text-sm text-zinc-400">カメラ</label>
            <select id="device-select" class="flex-1 px-2.5 py-2 rounded-xl bg-zinc-900 ring-1 ring-white/10"></select>
            <button id="btn-start" class="px-3 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500">起動</button>
          </div>
          <div class="flex items-center gap-3">
            <label class="text-sm text-zinc-400">ズーム</label>
            <input id="zoom-range" type="range" min="1" max="5" step="0.1" class="w-full">
            <span id="zoom-label" class="w-12 text-right text-sm">1.0×</span>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <button id="btn-capture" class="h-11 rounded-xl bg-amber-600 hover:bg-amber-500 font-medium">画像を送る</button>
            <button id="btn-rec" class="h-11 rounded-xl bg-rose-700 hover:bg-rose-600 font-medium">音声録音 ▶ 送信</button>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <button id="btn-audio-test" class="h-11 rounded-xl bg-zinc-800 hover:bg-zinc-700">音声テスト</button>
            <button id="btn-reset" class="h-11 rounded-xl bg-zinc-800 hover:bg-zinc-700">リセット</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Hidden canvas -->
    <canvas id="canvas" class="hidden"></canvas>

    <!-- コレクション画面 -->
    <div id="collection-overlay" class="collection-overlay fixed inset-0 z-40 bg-zinc-950 translate-y-full opacity-0 overflow-y-auto">
      <div class="max-w-screen-sm mx-auto p-4 pt-[calc(12px+var(--safe-top))] pb-[calc(24px+var(--safe-bottom))]">
        <!-- ヘッダー -->
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold">🎒 コレクション</h2>
          <button id="btn-close-collection" class="px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-sm">閉じる</button>
        </div>
        <div id="collection-stats" class="text-xs text-zinc-500 mb-4"></div>

        <!-- コレクショングリッド -->
        <div id="collection-grid" class="grid grid-cols-2 gap-3">
          <!-- 動的に追加 -->
        </div>

        <!-- 空の状態 -->
        <div id="collection-empty" class="text-center py-16 text-zinc-500">
          <div class="text-5xl mb-3">📷</div>
          <div class="text-sm">スキャンモードで撮影して<br>コレクションを始めよう！</div>
        </div>
      </div>
    </div>

    <!-- アイテム詳細ビュー -->
    <div id="item-detail" class="collection-overlay fixed inset-0 z-50 bg-zinc-950 translate-y-full opacity-0 overflow-y-auto">
      <div class="max-w-screen-sm mx-auto p-4 pt-[calc(12px+var(--safe-top))] pb-[calc(24px+var(--safe-bottom))]">
        <div class="flex items-center justify-between mb-4">
          <button id="btn-back-collection" class="px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-sm">← 戻る</button>
        </div>
        <div id="item-detail-content">
          <!-- 動的に追加 -->
        </div>
      </div>
    </div>

    <!-- スキャン結果カード（スキャン成功時に一時表示） -->
    <div id="scan-result" class="fixed inset-x-0 bottom-0 z-35 translate-y-full transition-transform duration-300">
      <div class="mx-auto max-w-screen-sm p-4 pb-[calc(16px+var(--safe-bottom))]">
        <div id="scan-result-card" class="rounded-2xl bg-zinc-900/95 ring-1 ring-white/10 backdrop-blur p-4 shadow-2xl">
          <!-- 動的に追加 -->
        </div>
      </div>
    </div>
  </main>

  <!-- ===== UI wiring ===== -->
  <script>
    const $ = (id) => document.getElementById(id);
    const chromeOverlay = $('chrome');
    const hitbox = $('hitbox');
    const sheet = $('sheet');
    const deviceSelect = $('device-select');

    // ステータス表示
    const setStatus = (text, live=false) => {
      $('status-text').textContent = text;
      $('status-led').className = `inline-block w-2.5 h-2.5 rounded-full ${live ? 'bg-emerald-500' : 'bg-zinc-500'}`;
    };
    window.setStatus = setStatus;

    // UI表示/非表示（動画タップで切替）
    let chromeVisible = true;
    const toggleChrome = (v) => {
      chromeVisible = (v ?? !chromeVisible);
      chromeOverlay.style.opacity = chromeVisible ? '1' : '0';
      chromeOverlay.style.pointerEvents = chromeVisible ? 'auto' : 'none';
    };
    window.toggleChrome = toggleChrome;
    hitbox.addEventListener('click', () => toggleChrome());

    // ボトムシート開閉
    const openSheet = () => { sheet.style.opacity = '1'; sheet.style.transform = 'translateY(0)'; hitbox.style.pointerEvents = 'none'; };
    const closeSheet = () => { sheet.style.opacity = '0'; sheet.style.transform = 'translateY(100%)'; hitbox.style.pointerEvents = ''; };
    window.openSheet = openSheet;
    window.closeSheet = closeSheet;
    // 端末差吸収: click に加えて pointer/touch でも反応させる
    ;['click','pointerup','touchend'].forEach(ev => $('btn-more')?.addEventListener(ev, openSheet));
    ;['click','pointerup','touchend'].forEach(ev => $('btn-close-sheet')?.addEventListener(ev, closeSheet));

    // クリック不能対策: マークアップ崩れの可能性に備え補正
    try {
      const btnMore = $('btn-more');
      if (btnMore) {
        btnMore.setAttribute('type', 'button');
        btnMore.setAttribute('aria-label', 'メニュー');
        if (!btnMore.textContent || !btnMore.textContent.trim()) btnMore.textContent = '⋯';
      }
      const btnClose = $('btn-close-sheet');
      if (btnClose) {
        btnClose.setAttribute('type', 'button');
        if (!btnClose.textContent || !btnClose.textContent.trim()) btnClose.textContent = '閉じる';
      }
      const btnStart = $('btn-start');
      if (btnStart) {
        btnStart.setAttribute('type', 'button');
        if (!btnStart.textContent || !btnStart.textContent.trim()) btnStart.textContent = '起動';
      }
    } catch (e) {
      console.warn('normalize buttons failed', e);
    }

    // デバイスセレクト（本実装では enumerateDevices で埋める）
    deviceSelect.innerHTML = '<option>デフォルトカメラ</option>';

    // ズームUI（対応端末のみ有効）
    const zoomRange = $('zoom-range');
    const zoomLabel = $('zoom-label');
    const applyZoom = (v) => { const z = Number(v).toFixed(1); zoomLabel.textContent = `${z}×`; };
    zoomRange.addEventListener('input', (e) => applyZoom(e.target.value));

    // トースト
    const toastEl = document.createElement('div');
    toastEl.className = 'fixed bottom-5 left-1/2 -translate-x-1/2 min-w-[220px] max-w-[90vw] px-4 py-2 rounded-xl bg-white/10 backdrop-blur text-sm shadow-2xl';
    const toast = (msg) => { toastEl.textContent = msg; document.body.appendChild(toastEl); setTimeout(()=>toastEl.remove(), 1800); };
    window.toast = toast;

    // ===== 端末内TTS（Web Speech API） =====
    let __voices = [];
    function __refreshVoices() { try { __voices = speechSynthesis.getVoices(); } catch {} }
    if ('speechSynthesis' in window) {
      speechSynthesis.addEventListener?.('voiceschanged', __refreshVoices);
      __refreshVoices();
    }
    function __pickVoiceJa() {
      return __voices.find(v => /ja/i.test(v.lang)) || __voices[0] || null;
    }
    let __speechUnlocked = false;
    function unlockSpeechOnce() {
      if (__speechUnlocked) return;
      try { speechSynthesis.resume(); } catch {}
      // 空の発話で解禁する
      try { const s = new SpeechSynthesisUtterance(''); s.lang = 'ja-JP'; speechSynthesis.speak(s); } catch {}
      __speechUnlocked = true;
    }
    // 初回タップで解禁（主要ボタン）
    ;['btn-start','btn-shutter','btn-capture','btn-rec','btn-audio-test'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('click', unlockSpeechOnce, { once: true });
    });
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      try { speechSynthesis.cancel(); } catch {}
      const u = new SpeechSynthesisUtterance(text);
      const v = __pickVoiceJa();
      if (v) u.voice = v;
      u.lang = (v && v.lang) || 'ja-JP';
      u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
      try { speechSynthesis.speak(u); } catch {}
    }
    window.speak = speak;

    // チャット: 最新1〜2メッセージのみ濃く表示。古いものはフェード→削除
    const chat = $('chat');
    const addChat = (text, who='bot') => {
      const bubble = document.createElement('div');
      bubble.className = `max-w-[80vw] sm:max-w-[60vw] px-3 py-2 rounded-2xl ring-1 ring-white/10 backdrop-blur ${who==='me' ? 'bg-emerald-700 ml-auto' : 'bg-zinc-900/75'}`;
      bubble.textContent = text;
      chat.appendChild(bubble);
      // 2つより古いメッセージはフェードアウト→削除
      const nodes = Array.from(chat.children);
      if (nodes.length > 2) {
        nodes.slice(0, nodes.length - 2).forEach(n => {
          n.classList.add('fade-out');
          setTimeout(() => n.remove(), 3600);
        });
      }
      // Botの時は喋る
      if (who === 'bot') { try { speak(text); } catch {} }
    };
    window.addChat = addChat;

    // ボタンの簡易動作
    $('btn-audio-test').addEventListener('click', () => {
      unlockSpeechOnce();
      addChat('テスト：この音声は聞こえますか？', 'bot');
    });

    // ===== モード切替 =====
    let currentMode = 'chat'; // 'chat' | 'scan'
    window.currentMode = currentMode;

    const modeChat = $('mode-chat');
    const modeScan = $('mode-scan');
    const btnShutter = $('btn-shutter');
    const shutterInner = $('shutter-inner');
    const scanOverlay = $('scan-overlay');

    function setMode(mode) {
      currentMode = mode;
      window.currentMode = mode;

      if (mode === 'chat') {
        modeChat.className = 'mode-btn active-chat px-3 py-1 text-xs font-bold rounded-full';
        modeScan.className = 'mode-btn px-3 py-1 text-xs font-bold rounded-full text-zinc-400';
        btnShutter.className = 'pointer-events-auto relative w-20 h-20 rounded-full bg-amber-500 shadow-[0_0_0_6px_rgba(255,255,255,0.18)] active:scale-95 transition';
        shutterInner.className = 'absolute inset-1 rounded-full bg-amber-600/70';
        scanOverlay?.classList.add('hidden');
        chat.style.display = '';
      } else {
        modeScan.className = 'mode-btn active-scan px-3 py-1 text-xs font-bold rounded-full';
        modeChat.className = 'mode-btn px-3 py-1 text-xs font-bold rounded-full text-zinc-400';
        btnShutter.className = 'pointer-events-auto relative w-20 h-20 rounded-full bg-cyan-500 shadow-[0_0_0_6px_rgba(255,255,255,0.18)] active:scale-95 transition';
        shutterInner.className = 'absolute inset-1 rounded-full bg-cyan-600/70';
        scanOverlay?.classList.remove('hidden');
        chat.style.display = 'none';
      }

      console.log(`🔀 モード切替: ${mode}`);
    }

    modeChat.addEventListener('click', () => setMode('chat'));
    modeScan.addEventListener('click', () => setMode('scan'));

    // ===== コレクションUI =====
    const collectionOverlay = $('collection-overlay');
    const itemDetail = $('item-detail');
    const scanResult = $('scan-result');

    function openCollection() {
      collectionOverlay.style.transform = 'translateY(0)';
      collectionOverlay.style.opacity = '1';
      toggleChrome(false);
      if (window.loadCollection) window.loadCollection();
    }
    function closeCollection() {
      collectionOverlay.style.transform = 'translateY(100%)';
      collectionOverlay.style.opacity = '0';
      toggleChrome(true);
    }
    function openItemDetail() {
      itemDetail.style.transform = 'translateY(0)';
      itemDetail.style.opacity = '1';
    }
    function closeItemDetail() {
      itemDetail.style.transform = 'translateY(100%)';
      itemDetail.style.opacity = '0';
    }
    function showScanResult(html) {
      $('scan-result-card').innerHTML = html;
      scanResult.style.transform = 'translateY(0)';
      setTimeout(() => { scanResult.style.transform = 'translateY(100%)'; }, 5000);
    }

    window.openCollection = openCollection;
    window.closeCollection = closeCollection;
    window.openItemDetail = openItemDetail;
    window.closeItemDetail = closeItemDetail;
    window.showScanResult = showScanResult;

    $('btn-collection')?.addEventListener('click', openCollection);
    $('btn-close-collection')?.addEventListener('click', closeCollection);
    $('btn-back-collection')?.addEventListener('click', closeItemDetail);

    // 初期状態でボタンを押せるように（pointer-events を有効化）
    toggleChrome(true);
  </script>

  <!-- camera.js（下の最新版を使う場合は読み込み） -->
  <script src="./camera.js"></script>
</body>
</html>
